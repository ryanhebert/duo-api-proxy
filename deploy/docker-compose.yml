version: '3.8'

services:
  proxy:
    build: 
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${PROXY_PORT:-8000}:${PROXY_PORT:-8000}"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      # Force internal container path for the spec
      - OPENAPI_SPEC_PATH=/app/duo-admin-api.yaml
    volumes:
      - ../certs:/app/certs:ro
      # Maps the spec from your .env path to a fixed location in the container
      - ${OPENAPI_SPEC_PATH:-../duoMcp/duo-admin-api.yaml}:/app/duo-admin-api.yaml:ro
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
